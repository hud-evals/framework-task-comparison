    type: object
- name: read
  description: Reads a file from the local filesystem. The filePath parameter must
    be an absolute path. By default reads up to 2000 lines. Use offset and limit for
    pagination. Lines longer than 2000 chars are truncated.
  inputSchema:
    additionalProperties: false
    properties:
      filePath:
        type: string
      offset:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      limit:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
    required:
    - filePath
    type: object
- name: grep
  description: Fast content search tool. Searches file contents using regular expressions.
    Supports full regex syntax. Filter files by pattern with 'include' parameter.
    Returns file paths and line numbers sorted by modification time.
  inputSchema:
    additionalProperties: false
    properties:
      pattern:
        type: string
      path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
      include:
        anyOf:
        - type: string
        - type: 'null'
        default: null
    required:
    - pattern
    type: object
- name: glob
  description: Fast file pattern matching tool. Supports glob patterns like '**/*.js'
    or 'src/**/*.ts'. Returns matching file paths sorted by modification time.
  inputSchema:
    additionalProperties: false
    properties:
      pattern:
        type: string
      path:
        anyOf:
        - type: string
        - type: 'null'
        default: null
    required:
    - pattern
    type: object
- name: list
  description: Lists files and directories in a given path. The path parameter must
    be absolute; omit it to use the current workspace directory. You can optionally
    provide an array of glob patterns to ignore.
  inputSchema:
